<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<link rel="stylesheet" href="/Css/style.css">
</head>

<body>

<h1>🐍 JOGO DA COBRINHA</h1>

<div class="game-container">

    <canvas id="game"></canvas>

    <div class="info">

        <div class="card">
            <h2>Pontuação</h2>
            <p id="score">0</p>
        </div>

        <div class="card">
            <h2>Recorde</h2>
            <p id="highScore">0</p>
        </div>

        <div class="controls-card">
            <h2>Controles</h2>

            <div class="controls">
                <div class="key">W</div>
                <div class="row">
                    <div class="key">A</div>
                    <div class="key">S</div>
                    <div class="key">D</div>
                </div>
                <p>ou setas do teclado</p>
            </div>

        </div>

        <button id="start">▶ Start</button>

    </div>

</div>

<script src="/Javascript/script.js"></script>

</body>
</html>
